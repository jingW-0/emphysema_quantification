[tox]
envlist = py{39,310,311}, lint, coverage
skip_missing_interpreters = true

[testenv]
deps =
    -r{toxinidir}/requirements-dev.txt
commands =
    pytest {posargs}

[testenv:coverage]
deps =
    -r{toxinidir}/requirements-dev.txt
commands =
    pytest --cov=. --cov-report=html --cov-report=term

[testenv:lint]
deps =
    black
    flake8
    isort
    mypy
commands =
    black --check --diff emphy_size.py emphy_size_distance.py tests/
    isort --check-only emphy_size.py emphy_size_distance.py tests/
    flake8 emphy_size.py emphy_size_distance.py tests/

[testenv:format]
deps =
    black
    isort
commands =
    black emphy_size.py emphy_size_distance.py tests/
    isort emphy_size.py emphy_size_distance.py tests/

[testenv:typecheck]
deps = -r{toxinidir}/requirements-dev.txt
commands = mypy emphy_size.py emphy_size_distance.py --ignore-missing-imports
